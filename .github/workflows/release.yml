name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (for example: v26.04). Leave empty to use current ref name."
        required: false
        type: string

permissions:
  contents: write

env:
  DEVBUILD: continuous

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "Invalid tag '$TAG'. It must look like v26.04"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"
          echo "Resolved version: $VERSION"

  linux:
    name: Linux native
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            build-essential \
            cmake \
            libboost-all-dev \
            libgl-dev \
            libmpv-dev
      - name: Install newer Qt version
        uses: jurplel/install-qt-action@v4
        with:
          cache: true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1000
          fetch-tags: true
      - name: Build
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          FORCE_VERSION=""

          if [ "$VERSION" != "$DEVBUILD" ]; then
            FORCE_VERSION="-DMPCQT_VERSION=$VERSION"
          fi

          cmake $FORCE_VERSION -DCMAKE_BUILD_TYPE=RelWithDebInfo -G Ninja -B build
          cmake --build build
      - name: Save, strip and link symbols
        run: |
          cd bin
          objcopy --only-keep-debug mpc-qt mpc-qt.dbg
          objcopy --strip-debug mpc-qt
          objcopy --add-gnu-debuglink=mpc-qt.dbg mpc-qt
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: mpc-qt-linux-x64-${{ needs.prepare.outputs.version }}
          path: bin/mpc-qt
      - name: Upload symbols file
        uses: actions/upload-artifact@v4
        with:
          name: mpc-qt-linux-x64-debug_symbols-${{ needs.prepare.outputs.version }}
          path: bin/mpc-qt.dbg

  windows:
    name: Windows msys2
    runs-on: windows-2025
    needs: prepare
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install packages
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            git
            base-devel
            wget
            p7zip
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-qt6
            mingw-w64-x86_64-qt-creator
            mingw-w64-x86_64-imagemagick
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-vulkan-loader
      - name: Avoid line ending issues on Windows
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v4
      - name: Download yt-dlp
        uses: robinraju/release-downloader@v1
        with:
          repository: "yt-dlp/yt-dlp"
          latest: true
          fileName: "yt-dlp.exe"
      - name: Set version
        run: echo "FORCE_VERSION=${{ needs.prepare.outputs.version }}" >> "$GITHUB_ENV"
      - name: Build
        run: |
          chmod +x scripts/*.sh
          bash scripts/make-release-msys2.sh
      - name: Upload package directory
        uses: actions/upload-artifact@v4
        with:
          name: mpc-qt-win-x64-${{ needs.prepare.outputs.version }}
          path: mpc-qt-win-x64/
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mpc-qt-win-installer-${{ needs.prepare.outputs.version }}
          path: build/mpc-qt-win-x64-installer.exe

  appimage:
    name: AppImage
    needs: prepare
    uses: ./.github/workflows/appimage.yml

  flatpak:
    name: Flatpak
    needs: prepare
    uses: ./.github/workflows/flatpak.yml

  publish:
    name: Publish GitHub Release
    needs: [prepare, linux, windows, appimage, flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: dist/**/*
